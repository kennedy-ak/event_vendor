<!-- Floating Chat Widget -->
<style>
.chat-widget-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 60px;
    height: 60px;
    background: linear-gradient(135deg, #0077B6 0%, #00B4D8 100%);
    color: white;
    border-radius: 50%;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(0, 119, 182, 0.4);
    z-index: 1000;
    transition: transform 0.3s, box-shadow 0.3s;
}

.chat-widget-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 6px 16px rgba(0, 119, 182, 0.6);
}

.chat-widget-popup {
    position: fixed;
    bottom: 90px;
    right: 20px;
    width: 350px;
    height: 500px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    z-index: 1000;
    display: none;
    flex-direction: column;
}

.chat-widget-popup.active {
    display: flex;
}

.chat-widget-header {
    background: linear-gradient(135deg, #0077B6 0%, #00B4D8 100%);
    color: white;
    padding: 1rem;
    border-radius: 12px 12px 0 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.chat-widget-header h3 {
    margin: 0;
    font-size: 1.1rem;
}

.chat-widget-close {
    background: none;
    border: none;
    color: white;
    font-size: 1.5rem;
    cursor: pointer;
    padding: 0;
    width: 30px;
    height: 30px;
}

.chat-widget-messages {
    flex: 1;
    overflow-y: auto;
    padding: 1rem;
    background: #F8F9FA;
}

.chat-widget-input-container {
    padding: 1rem;
    background: white;
    border-top: 1px solid #E5E7EB;
    border-radius: 0 0 12px 12px;
}

.chat-widget-cta {
    background: white;
    padding: 1rem;
    text-align: center;
    border-top: 1px solid #E5E7EB;
}

.chat-widget-cta a {
    display: inline-block;
    padding: 0.75rem 1.5rem;
    background: #0077B6;
    color: white;
    text-decoration: none;
    border-radius: 6px;
    font-weight: 600;
}

.chat-widget-cta a:hover {
    background: #005A8C;
}

@media (max-width: 768px) {
    .chat-widget-popup {
        right: 10px;
        left: 10px;
        width: auto;
    }
}
</style>

<button class="chat-widget-btn" id="chatWidgetBtn" title="Chat with AI Event Planner">
    🤖
</button>

<div class="chat-widget-popup" id="chatWidgetPopup">
    <div class="chat-widget-header">
        <h3>🎉 AI Event Planner</h3>
        <button class="chat-widget-close" id="chatWidgetClose">&times;</button>
    </div>
    <div class="chat-widget-messages" id="widgetMessages">
        <div style="text-align: center; padding: 2rem; color: #6B7280;">
            <p>👋 Hi! I can help you plan your event!</p>
            <p style="font-size: 0.9rem;">Click below to get started</p>
        </div>
    </div>
    <div class="chat-widget-cta">
        <a href="/chatbot/plan-my-event/">Start Planning Your Event</a>
    </div>
</div>

<script>
document.getElementById('chatWidgetBtn').addEventListener('click', () => {
    document.getElementById('chatWidgetPopup').classList.add('active');
});

document.getElementById('chatWidgetClose').addEventListener('click', () => {
    document.getElementById('chatWidgetPopup').classList.remove('active');
});
</script>
